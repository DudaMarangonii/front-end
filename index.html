<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arquivo de Trabalhos</title>

<style>

body {
    margin: 0;
    font-family: Georgia, 'Times New Roman', serif;
    background: #eae3d2;
    color: #2f3e2f;
}


body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: radial-gradient(rgba(0,0,0,0.03) 1px, transparent 1px);
    background-size: 4px 4px;
    pointer-events: none;
}

.container {
    max-width: 1000px;
    margin: auto;
    padding: 30px;
}

header {
    text-align: center;
    margin-bottom: 40px;
}


header::after {
    content: "❦ ❦ ❦";
    display: block;
    margin-top: 10px;
    color: #588157;
    letter-spacing: 10px;
}

header h1 {
    font-size: 2.5rem;
    color: #3a5a40;
}

header p {
    color: #5f6f5f;
}


.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
}


.card {
    position: relative;
    background: #f5f0e6;
    border: 1px solid #cbdac6;
    border-radius: 12px;
    padding: 18px;
    transition: 0.3s;
    box-shadow: 3px 3px 10px rgba(0,0,0,0.08);
}


.card::before {
    content: "Arquivo";
    position: absolute;
    top: 10px;
    right: 10px;
    background: #588157;
    color: white;
    font-size: 0.7rem;
    padding: 3px 6px;
    border-radius: 4px;
}


.card:hover {
    transform: translateY(-6px);
    box-shadow: 6px 10px 20px rgba(0,0,0,0.15);
}

.card h3 {
    margin-top: 0;
    color: #3a5a40;
}

.card p {
    color: #4f5d4f;
}


.card a {
    display: inline-block;
    margin-top: 10px;
    text-decoration: none;
    background: #588157;
    color: #fff;
    padding: 7px 14px;
    border-radius: 20px;
    font-size: 0.9rem;
    transition: 0.2s;
}

.card a:hover {
    background: #3a5a40;
}


footer {
    text-align: center;
    margin-top: 50px;
    color: #5f6f5f;
    font-size: 0.9rem;
}


.card {
    animation: fadeUp 0.6s ease;
}

@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(15px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

</style>

</head>

<body>

<div class="container">

<header>
<h1>📚 Arquivo de Trabalhos</h1>
<p>Minhas atividades!</p>
</header>

<section class="grid">

<div class="card">
<h3>Trabalho 1</h3>
<a href="https://dudamarangonii.github.io/front-end/att1.html">Abrir</a>
</div>

<div class="card">
<h3>Trabalho 2</h3>
<a href="https://dudamarangonii.github.io/front-end/att2.html">Abrir</a>
</div>

<div class="card">
<h3>Trabalho 3</h3>
<a href="https://dudamarangonii.github.io/front-end/att3.html">Abrir</a>
</div>

<div class="card">
<h3>Trabalho 4</h3>
<a href="https://dudamarangonii.github.io/front-end/att4.html">Abrir</a>
</div>

<div class="card">
<h3>Trabalho 5</h3>
<a href="https://dudamarangonii.github.io/front-end/att5.html">Abrir</a>
</div>

<div class="card">
<h3>Trabalho 6</h3>
<a href="https://dudamarangonii.github.io/front-end/atividade 6/att6.html">Abrir</a>
</div>

</section>

<footer>
<p>© 2026 • Arquivo pessoal da Duda</p>
</footer>

</div>

</body>
</html>
