<!DOCTYPE html>
<html>
<head>
<title>lista ex 1</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f2f2f2;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .todo-app {
        text-align: center;
        max-width: 700px;
        padding: 20px;
        border: 1px solid #ccc;
        border-radius: 5px;
        background-color: #fff;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }
    button {
        border: solid 1px gray;
        border-radius: 10px;
        background-color: rgba(0, 0, 0, 0);
        font-family: Arial, Helvetica, sans-serif;
        padding: 5px;
        width: 100px;
    }
    button:hover {
        background-color: gray;
        cursor: pointer;
    }
    .true{
    color: green;
    }
    .false{
    color: red;
    }
    

</style>
</head>



<body>
    <div class="todo-app">
        <h2>verificador cpf</h2>
        <input type="number" id="valor" placeholder="valor"><br><br>
        <button onclick="funcao()">Verificar</button>
        <div id="resultado"></div>

    </div>


    <script>
        const cpf = document.getElementById("valor");
        const demo = document.getElementById("resultado");
        const list = document.getElementById("resultado").classList;
        
        function funcao(){
            let som = 0;
            let res = 0;
            let d1 = 0;
            let d2 = 0;
            let pri = 10;
            let sec = 11;
            
            if(cpf.value != "")
            {
            for(let i=0;i < 9;i++){
            const digito = Number(cpf.value[i]);
            som += digito * pri;
            pri--;
            }
            res = som%11;
            if(res != 0 && res !=1){
                d1 = 11 - res;
            }
            else{
                d1 = 0;
            }
            som = 0;
            for(i=0;i < 10;i++){
            const digito = Number(cpf.value[i]);
            som += digito * sec;
            sec--;
            }
            res = som%11;
            if(res != 0 && res !=1){
                d2 = 11 - res;
            }
            else{
                d2 = 0;
            }
            if(d1 == cpf.value[9] && d2 == cpf.value[10])
            {
               demo.innerHTML = `<br>Valido`;
               list.remove("false");
               list.add("true");
            }
            else
            {
                demo.innerHTML = `<br>Invalido`;
                list.remove("true");
                list.add("false");
            }
        }
        else
        {
            alert("digite seu cpf");
        }
           
        }
    </script>
    
</body>
</html>
